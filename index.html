<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyPOS 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Anuphan', sans-serif; 
            background-color: #f8fafc;
            color: #1e293b;
        }
        .product-card:hover {
            transform: translateY(-2px);
            border-color: #3b82f6;
        }
        .cart-item-anim {
            animation: slideIn 0.2s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <nav class="bg-white border-b px-6 py-3 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-4">
            <div class="bg-blue-600 text-white p-2 rounded-lg font-bold">POS</div>
            <h1 class="text-xl font-bold tracking-tight">ระบบขายหน้าร้าน</h1>
        </div>
        <div class="flex items-center gap-3">
            <span id="sync-status" class="text-sm text-slate-400">กำลังเชื่อมต่อ...</span>
            <button onclick="fetchData()" class="bg-slate-100 hover:bg-slate-200 p-2 rounded-full transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            </button>
        </div>
    </nav>

    <main class="flex flex-1 overflow-hidden">
        
        <section class="flex-1 flex flex-col p-6 overflow-hidden">
            <div class="mb-6 relative">
                <input type="text" id="searchInput" oninput="filterProducts()" 
                    placeholder="พิมพ์ชื่อสินค้า หรือ สแกนบาร์โค้ด..." 
                    class="w-full text-lg border-2 border-slate-200 rounded-2xl px-12 py-4 focus:border-blue-500 focus:outline-none transition-all shadow-sm">
                <svg class="w-6 h-6 absolute left-4 top-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>

            <div id="productGrid" class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4 overflow-y-auto pr-2 pb-10">
                </div>
        </section>

        <aside class="w-[400px] bg-white border-l flex flex-col shadow-2xl">
            <div class="p-6 border-b flex justify-between items-baseline">
                <h2 class="text-xl font-bold">รายการสั่งซื้อ</h2>
                <button onclick="clearCart()" class="text-sm text-red-500 hover:underline">ล้างทั้งหมด</button>
            </div>

            <div id="cartList" class="flex-1 overflow-y-auto p-4 space-y-3">
                <div id="empty-msg" class="text-center mt-20 text-slate-400">
                    <p>ยังไม่มีสินค้าในตะกร้า</p>
                </div>
            </div>

            <div class="p-6 bg-slate-50 border-t space-y-4">
                <div class="flex justify-between text-slate-600">
                    <span>จำนวนรายการ</span>
                    <span id="total-qty" class="font-bold">0</span>
                </div>
                <div class="flex justify-between text-2xl font-bold text-blue-700">
                    <span>ยอดรวมสุทธิ</span>
                    <span id="total-amount">฿0.00</span>
                </div>
                <button onclick="processCheckout()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-5 rounded-2xl text-xl font-bold transition shadow-lg active:scale-[0.98]">
                    ชำระเงิน
                </button>
            </div>
        </aside>
    </main>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTaJT9WaWQ7-BDK5vkjQwrcZ9W86RATTgFsgH7dsAfhAOqbpA878B22qCbQVhQu24gZjQvw9MwDedQt/pub?output=csv';
        let inventory = [];
        let cart = [];

        // Data Management
        async function fetchData() {
            document.getElementById('sync-status').innerText = '🔄 กำลังโหลดข้อมูล...';
            try {
                const response = await fetch(CSV_URL);
                const data = await response.text();
                inventory = parseCSV(data);
                renderProducts(inventory);
                document.getElementById('sync-status').innerText = '✅ อัปเดตล่าสุด: ' + new Date().toLocaleTimeString();
            } catch (error) {
                document.getElementById('sync-status').innerText = '❌ ผิดพลาด';
                console.error(error);
            }
        }

        function parseCSV(csv) {
            const lines = csv.split('\n');
            const headers = lines[0].split(',').map(h => h.trim());
            return lines.slice(1).filter(line => line.trim()).map(line => {
                const values = line.split(',');
                let obj = {};
                headers.forEach((h, i) => obj[h] = values[i]?.trim());
                return obj;
            });
        }

        // UI Rendering
        function renderProducts(items) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = items.map(item => `
                <div onclick="addToCart('${item.รหัสสินค้า}')" 
                     class="product-card cursor-pointer bg-white border-2 border-slate-100 p-4 rounded-2xl transition-all active:scale-95 shadow-sm">
                    <div class="text-blue-600 font-bold text-lg mb-1">฿${parseFloat(item.ราคา).toLocaleString()}</div>
                    <div class="font-semibold text-slate-800 leading-tight mb-2 h-10 overflow-hidden">${item.ชื่อการค้า}</div>
                    <div class="flex justify-between items-center text-xs text-slate-400">
                        <span>${item.รหัสสินค้า}</span>
                        <span class="bg-slate-100 px-2 py-0.5 rounded">${item.หน่วย}</span>
                    </div>
                </div>
            `).join('');
        }

        function filterProducts() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const filtered = inventory.filter(i => 
                i.ชื่อการค้า.toLowerCase().includes(val) || 
                i.รหัสสินค้า.includes(val) || 
                i.บาร์โค้ด.includes(val)
            );
            renderProducts(filtered);
        }

        // Cart Logic
        function addToCart(id) {
            const item = inventory.find(i => i.รหัสสินค้า === id);
            const inCart = cart.find(c => c.รหัสสินค้า === id);

            if (inCart) {
                inCart.qty++;
            } else {
                cart.push({ ...item, qty: 1 });
            }
            updateUI();
        }

        function changeQty(id, delta) {
            const inCart = cart.find(c => c.รหัสสินค้า === id);
            if (inCart) {
                inCart.qty += delta;
                if (inCart.qty <= 0) cart = cart.filter(c => c.รหัสสินค้า !== id);
            }
            updateUI();
        }

        function updateUI() {
            const list = document.getElementById('cartList');
            const emptyMsg = document.getElementById('empty-msg');
            
            if (cart.length === 0) {
                list.innerHTML = '';
                list.appendChild(emptyMsg);
            } else {
                list.innerHTML = cart.map(item => `
                    <div class="cart-item-anim flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-200">
                        <div class="flex-1">
                            <div class="font-bold text-sm">${item.ชื่อการค้า}</div>
                            <div class="text-xs text-blue-600 font-bold">฿${parseFloat(item.ราคา).toLocaleString()}</div>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="changeQty('${item.รหัสสินค้า}', -1)" class="w-8 h-8 flex items-center justify-center rounded-lg bg-white border border-slate-300">-</button>
                            <span class="w-6 text-center font-bold">${item.qty}</span>
                            <button onclick="changeQty('${item.รหัสสินค้า}', 1)" class="w-8 h-8 flex items-center justify-center rounded-lg bg-white border border-slate-300">+</button>
                        </div>
                    </div>
                `).join('');
            }

            const total = cart.reduce((sum, i) => sum + (i.ราคา * i.qty), 0);
            const count = cart.reduce((sum, i) => sum + i.qty, 0);
            
            document.getElementById('total-amount').innerText = `฿${total.toLocaleString()}`;
            document.getElementById('total-qty').innerText = count;
        }

        function clearCart() {
            if (confirm('คุณต้องการล้างรายการทั้งหมดใช่หรือไม่?')) {
                cart = [];
                updateUI();
            }
        }

        function processCheckout() {
            if (cart.length === 0) return alert('กรุณาเลือกสินค้าก่อนชำระเงิน');
            const total = cart.reduce((sum, i) => sum + (i.ราคา * i.qty), 0);
            alert(`✅ ชำระเงินเรียบร้อยแล้ว\nยอดรวม: ฿${total.toLocaleString()}`);
            cart = [];
            updateUI();
        }

        // Load Initial Data
        fetchData();
    </script>
</body>
</html>
