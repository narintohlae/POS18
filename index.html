<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPOS 2026 | Cloud Inventory</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="posSystem()" x-init="initData()">

    <aside class="fixed left-0 top-0 h-screen w-20 bg-slate-900 text-white flex flex-col items-center py-8 gap-8 z-50">
        <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center mb-4">
            <i class="fas fa-bolt text-xl"></i>
        </div>
        <button @click="view = 'pos'" :class="view === 'pos' ? 'bg-indigo-500/20 text-indigo-400' : 'text-slate-500'" class="w-12 h-12 rounded-xl transition-all hover:bg-slate-800">
            <i class="fas fa-th-large"></i>
        </button>
        <button @click="view = 'inventory'" :class="view === 'inventory' ? 'bg-indigo-500/20 text-indigo-400' : 'text-slate-500'" class="w-12 h-12 rounded-xl transition-all hover:bg-slate-800">
            <i class="fas fa-box"></i>
        </button>
        <button @click="view = 'history'" :class="view === 'history' ? 'bg-indigo-500/20 text-indigo-400' : 'text-slate-500'" class="w-12 h-12 rounded-xl transition-all hover:bg-slate-800">
            <i class="fas fa-history"></i>
        </button>
    </aside>

    <main class="ml-20 p-8 grid grid-cols-12 gap-8 h-screen overflow-hidden">
        
        <section class="col-span-8 h-full flex flex-col overflow-hidden">
            <header class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-3xl font-bold text-slate-800" x-text="view === 'pos' ? 'Terminal One' : (view === 'inventory' ? 'Inventory Control' : 'Sales History')"></h1>
                    <p class="text-slate-500 text-sm">Update: <span x-text="lastUpdate"></span></p>
                </div>
                <div class="flex gap-4">
                    <div class="relative">
                        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="text" x-model="searchQuery" placeholder="Search products..." class="pl-12 pr-4 py-3 bg-white border border-slate-200 rounded-2xl w-64 focus:ring-2 ring-indigo-500 outline-none transition-all">
                    </div>
                    <button @click="fetchData()" class="px-4 py-3 bg-white border border-slate-200 rounded-2xl hover:bg-slate-50 transition-all">
                        <i class="fas fa-sync" :class="loading ? 'animate-spin' : ''"></i>
                    </button>
                </div>
            </header>

            <template x-if="loading">
                <div class="flex-1 flex flex-col items-center justify-center text-slate-400">
                    <div class="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p>Fetching data from Google Sheets...</p>
                </div>
            </template>

            <div x-show="view === 'pos' && !loading" class="flex-1 overflow-y-auto hide-scrollbar pb-10">
                <div class="product-grid">
                    <template x-for="item in filteredProducts" :key="item.id">
                        <div @click="addToCart(item)" class="group bg-white p-4 rounded-3xl border border-slate-100 hover:border-indigo-200 transition-all cursor-pointer hover:shadow-xl hover:shadow-indigo-500/5 relative overflow-hidden">
                            <div class="aspect-square bg-slate-50 rounded-2xl mb-4 flex items-center justify-center text-3xl overflow-hidden">
                                <img :src="item.image || 'https://via.placeholder.com/150?text=Product'" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                            </div>
                            <h3 class="font-bold text-slate-800 truncate" x-text="item.name"></h3>
                            <p class="text-indigo-600 font-bold mt-1">฿<span x-text="formatNumber(item.price)"></span></p>
                            <div class="mt-2 flex items-center gap-2">
                                <span class="text-[10px] px-2 py-1 bg-slate-100 rounded-full text-slate-500" x-text="'Stock: ' + item.stock"></span>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div x-show="view === 'inventory'" class="flex-1 bg-white rounded-3xl border border-slate-100 overflow-hidden flex flex-col">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-100 text-slate-500 text-sm uppercase">
                        <tr>
                            <th class="p-4">SKU/ID</th>
                            <th class="p-4">Product Name</th>
                            <th class="p-4 text-right">Unit Price</th>
                            <th class="p-4 text-center">In Stock</th>
                            <th class="p-4 text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-50">
                        <template x-for="item in products">
                            <tr>
                                <td class="p-4 font-mono text-xs text-slate-400" x-text="item.id"></td>
                                <td class="p-4 font-semibold text-slate-700" x-text="item.name"></td>
                                <td class="p-4 text-right font-bold text-indigo-600">฿<span x-text="formatNumber(item.price)"></span></td>
                                <td class="p-4 text-center" x-text="item.stock"></td>
                                <td class="p-4 text-center">
                                    <span :class="item.stock > 10 ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'" 
                                          class="px-3 py-1 rounded-full text-xs font-medium" 
                                          x-text="item.stock > 10 ? 'Healthy' : 'Low Stock'"></span>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </section>

        <section class="col-span-4 h-full bg-white rounded-[40px] border border-slate-100 shadow-2xl shadow-slate-200/50 p-6 flex flex-col">
            <h2 class="text-xl font-bold text-slate-800 mb-6 flex items-center justify-between">
                Current Order
                <span class="text-sm font-normal text-slate-400" x-text="cart.length + ' items'"></span>
            </h2>

            <div class="flex-1 overflow-y-auto hide-scrollbar mb-6">
                <template x-if="cart.length === 0">
                    <div class="h-full flex flex-col items-center justify-center text-slate-300">
                        <i class="fas fa-shopping-basket text-5xl mb-4"></i>
                        <p>Cart is empty</p>
                    </div>
                </template>
                
                <div class="space-y-4">
                    <template x-for="(item, index) in cart" :key="index">
                        <div class="flex items-center gap-4 bg-slate-50 p-3 rounded-2xl">
                            <div class="w-12 h-12 bg-white rounded-xl flex-shrink-0 flex items-center justify-center font-bold text-indigo-500 shadow-sm" x-text="item.qty"></div>
                            <div class="flex-1 overflow-hidden">
                                <p class="font-bold text-slate-800 truncate text-sm" x-text="item.name"></p>
                                <p class="text-xs text-slate-400">฿<span x-text="formatNumber(item.price * item.qty)"></span></p>
                            </div>
                            <div class="flex gap-1">
                                <button @click="removeFromCart(index)" class="w-8 h-8 rounded-lg text-slate-400 hover:bg-red-50 hover:text-red-500 transition-all"><i class="fas fa-minus text-xs"></i></button>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div class="space-y-3 pt-6 border-t border-slate-100">
                <div class="flex justify-between text-slate-500">
                    <span>Subtotal</span>
                    <span class="font-bold">฿<span x-text="formatNumber(cartTotal)"></span></span>
                </div>
                <div class="flex justify-between text-slate-500">
                    <span>VAT (7%)</span>
                    <span class="font-bold">฿<span x-text="formatNumber(cartTotal * 0.07)"></span></span>
                </div>
                <div class="flex justify-between text-2xl font-black text-slate-800 py-2">
                    <span>Total</span>
                    <span>฿<span x-text="formatNumber(cartTotal * 1.07)"></span></span>
                </div>
                
                <button @click="processPayment()" :disabled="cart.length === 0" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-200 active:scale-95 disabled:opacity-50 disabled:active:scale-100">
                    Pay with QR / Cash
                </button>
            </div>
        </section>
    </main>

    <div x-show="toast.show" x-cloak x-transition class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl z-[100] flex items-center gap-3">
        <i class="fas fa-check-circle text-green-400"></i>
        <span x-text="toast.message"></span>
    </div>

    <script>
        function posSystem() {
            return {
                loading: true,
                view: 'pos',
                searchQuery: '',
                lastUpdate: '',
                products: [],
                cart: [],
                toast: { show: false, message: '' },
                sheetUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTaJT9WaWQ7-BDK5vkjQwrcZ9W86RATTgFsgH7dsAfhAOqbpA878B22qCbQVhQu24gZjQvw9MwDedQt/pub?output=csv',

                initData() {
                    this.fetchData();
                    // Auto-refresh every 5 minutes
                    setInterval(() => this.fetchData(), 300000);
                },

                async fetchData() {
                    this.loading = true;
                    try {
                        const response = await fetch(this.sheetUrl);
                        const csvText = await response.text();
                        
                        Papa.parse(csvText, {
                            header: true,
                            complete: (results) => {
                                // แปลงข้อมูลให้เข้ากับ Schema ของเรา
                                this.products = results.data.map((row, index) => ({
                                    id: row.ID || row.id || index,
                                    name: row.Name || row.name || 'Unnamed Product',
                                    price: parseFloat(row.Price || row.price || 0),
                                    stock: parseInt(row.Stock || row.stock || 0),
                                    image: row.Image || row.image || null,
                                    category: row.Category || row.category || 'General'
                                }));
                                this.lastUpdate = new Date().toLocaleTimeString();
                                this.loading = false;
                                this.showToast('Inventory Synced!');
                            }
                        });
                    } catch (error) {
                        console.error('Fetch error:', error);
                        this.loading = false;
                        alert('Failed to load data from Google Sheets');
                    }
                },

                get filteredProducts() {
                    if (!this.searchQuery) return this.products;
                    return this.products.filter(p => 
                        p.name.toLowerCase().includes(this.searchQuery.toLowerCase()) ||
                        p.id.toString().includes(this.searchQuery)
                    );
                },

                get cartTotal() {
                    return this.cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
                },

                addToCart(product) {
                    if (product.stock <= 0) {
                        this.showToast('Out of stock!');
                        return;
                    }

                    const existing = this.cart.find(item => item.id === product.id);
                    if (existing) {
                        if (existing.qty < product.stock) {
                            existing.qty++;
                        } else {
                            this.showToast('Max stock reached');
                        }
                    } else {
                        this.cart.push({ ...product, qty: 1 });
                    }
                },

                removeFromCart(index) {
                    if (this.cart[index].qty > 1) {
                        this.cart[index].qty--;
                    } else {
                        this.cart.splice(index, 1);
                    }
                },

                processPayment() {
                    // ในระบบจริง จะมีการตัดสต็อกผ่าน API ไปยัง Google Sheets Apps Script
                    // สำหรับตัวอย่างนี้ เราจะตัดสต็อกใน Memory ชั่วคราว
                    this.cart.forEach(cartItem => {
                        const product = this.products.find(p => p.id === cartItem.id);
                        if (product) product.stock -= cartItem.qty;
                    });

                    this.cart = [];
                    this.showToast('Sale Completed! Stock updated.');
                    this.view = 'inventory';
                    setTimeout(() => this.view = 'pos', 1500);
                },

                showToast(msg) {
                    this.toast.message = msg;
                    this.toast.show = true;
                    setTimeout(() => this.toast.show = false, 3000);
                },

                formatNumber(num) {
                    return new Intl.NumberFormat('th-TH', { minimumFractionDigits: 2 }).format(num);
                }
            }
        }
    </script>
</body>
</html>
