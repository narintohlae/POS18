<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern POS 2026 | Next-Gen Retail</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Anuphan:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
        }
        body {
            font-family: 'Inter', 'Anuphan', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            overflow: hidden;
        }
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
        }
        .product-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
        }
    </style>
</head>
<body class="p-4 md:p-6 flex flex-col">

    <header class="flex justify-between items-center mb-6 glass-panel px-6 py-4">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 p-2 rounded-xl text-white">
                <i data-lucide="layout-grid"></i>
            </div>
            <h1 class="text-xl font-bold text-gray-800">SMART POS <span class="text-indigo-600">2026</span></h1>
        </div>
        
        <div class="flex-1 max-w-md mx-8 relative">
            <i data-lucide="search" class="absolute left-3 top-2.5 text-gray-400 w-5 h-5"></i>
            <input type="text" id="searchInput" placeholder="ค้นหาสินค้าหรือสแกนบาร์โค้ด..." 
                class="w-full pl-10 pr-4 py-2 bg-white/50 border-0 rounded-full focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
        </div>

        <div class="flex items-center gap-4">
            <div class="text-right hidden sm:block">
                <p id="clock" class="text-sm font-semibold text-gray-700"></p>
                <p class="text-xs text-gray-500">แคชเชียร์: Admin-01</p>
            </div>
            <button onclick="fetchData()" class="p-2 hover:bg-white/50 rounded-full transition-colors">
                <i data-lucide="refresh-cw" id="refreshIcon"></i>
            </button>
        </div>
    </header>

    <main class="flex flex-col md:flex-row gap-6 flex-1 overflow-hidden">
        
        <section class="flex-1 flex flex-col">
            <div id="categoryTabs" class="flex gap-2 mb-4 overflow-x-auto pb-2 custom-scrollbar">
                <button onclick="filterCategory('All')" class="px-5 py-2 rounded-full bg-indigo-600 text-white shadow-lg whitespace-nowrap">ทั้งหมด</button>
                </div>

            <div id="productGrid" class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 overflow-y-auto pr-2 custom-scrollbar">
                <div class="col-span-full py-20 text-center text-gray-500">
                    <div class="animate-spin mb-4 inline-block"><i data-lucide="loader-2" class="w-8 h-8"></i></div>
                    <p>กำลังโหลดข้อมูลสินค้า...</p>
                </div>
            </div>
        </section>

        <aside class="w-full md:w-[400px] flex flex-col glass-panel overflow-hidden shadow-2xl">
            <div class="p-6 border-b border-gray-100 flex justify-between items-center">
                <h2 class="text-lg font-bold flex items-center gap-2">
                    <i data-lucide="shopping-cart" class="text-indigo-600"></i>
                    รายการคำสั่งซื้อ
                </h2>
                <button onclick="clearCart()" class="text-sm text-red-500 hover:text-red-700">ล้างทั้งหมด</button>
            </div>

            <div id="cartItems" class="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar">
                <div class="text-center py-10 text-gray-400">
                    <p>ยังไม่มีสินค้าในรถเข็น</p>
                </div>
            </div>

            <div class="p-6 bg-white/80 border-t border-gray-100 space-y-4">
                <div class="flex justify-between text-gray-600">
                    <span>ยอดรวม (Subtotal)</span>
                    <span id="subtotal">฿0.00</span>
                </div>
                <div class="flex justify-between text-gray-600">
                    <span>ภาษี (VAT 7%)</span>
                    <span id="vat">฿0.00</span>
                </div>
                <div class="flex justify-between items-end pt-2">
                    <span class="text-lg font-bold">รวมทั้งสิ้น</span>
                    <span id="total" class="text-3xl font-black text-indigo-600">฿0.00</span>
                </div>
                
                <button onclick="processPayment()" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-bold text-lg shadow-lg shadow-indigo-200 transition-all flex justify-center items-center gap-2">
                    <i data-lucide="credit-card"></i> ชำระเงิน
                </button>
            </div>
        </aside>
    </main>

    <div id="paymentModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-3xl w-full max-w-md p-8 shadow-2xl">
            <h3 class="text-2xl font-bold mb-6">รับชำระเงิน</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-500 mb-1">ยอดรวมที่ต้องชำระ</label>
                    <div id="modalTotal" class="text-3xl font-black text-indigo-600">฿0.00</div>
                </div>
                <div>
                    <label class="block text-sm text-gray-500 mb-1">รับเงินมา</label>
                    <input type="number" id="cashReceived" class="w-full text-2xl p-4 bg-gray-50 border-2 border-indigo-100 rounded-xl outline-none focus:border-indigo-600" placeholder="0.00">
                </div>
                <div class="flex justify-between text-xl font-bold pt-4 border-t">
                    <span>เงินทอน:</span>
                    <span id="changeAmount" class="text-green-600">฿0.00</span>
                </div>
                <div class="grid grid-cols-2 gap-4 mt-6">
                    <button onclick="closeModal()" class="py-3 px-4 bg-gray-100 rounded-xl font-semibold">ยกเลิก</button>
                    <button onclick="completeSale()" class="py-3 px-4 bg-indigo-600 text-white rounded-xl font-semibold">เสร็จสิ้น</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTaJT9WaWQ7-BDK5vkjQwrcZ9W86RATTgFsgH7dsAfhAOqbpA878B22qCbQVhQu24gZjQvw9MwDedQt/pub?output=csv';
        
        let products = [];
        let cart = [];
        let currentCategory = 'All';

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            fetchData();
            updateClock();
            setInterval(updateClock, 1000);
            lucide.createIcons();
            
            // Search listener
            document.getElementById('searchInput').addEventListener('input', (e) => {
                renderProducts(e.target.value);
            });

            // Change calculation
            document.getElementById('cashReceived').addEventListener('input', calculateChange);
        });

        async function fetchData() {
            const refreshIcon = document.getElementById('refreshIcon');
            refreshIcon.classList.add('animate-spin');
            
            try {
                const response = await fetch(CSV_URL);
                const data = await response.text();
                products = parseCSV(data);
                renderCategories();
                renderProducts();
            } catch (error) {
                console.error('Error fetching data:', error);
                alert('ไม่สามารถโหลดข้อมูลสินค้าได้');
            } finally {
                refreshIcon.classList.remove('animate-spin');
            }
        }

        function parseCSV(csvText) {
            const lines = csvText.split('\n');
            const result = [];
            const headers = lines[0].split(',').map(h => h.trim());

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i]) continue;
                const obj = {};
                const currentline = lines[i].split(',');

                headers.forEach((header, index) => {
                    obj[header] = currentline[index]?.trim();
                });
                
                // Ensure data types
                obj.Price = parseFloat(obj.Price) || 0;
                obj.ID = obj.ID || i;
                obj.Image = obj.Image || `https://source.unsplash.com/featured/?${obj.Name || 'product'}`;
                
                result.push(obj);
            }
            return result;
        }

        function renderCategories() {
            const categories = ['All', ...new Set(products.map(p => p.Category).filter(Boolean))];
            const container = document.getElementById('categoryTabs');
            container.innerHTML = categories.map(cat => `
                <button onclick="filterCategory('${cat}')" 
                    class="px-5 py-2 rounded-full transition-all whitespace-nowrap ${currentCategory === cat ? 'bg-indigo-600 text-white shadow-lg' : 'bg-white/50 text-gray-600 hover:bg-white'}">
                    ${cat === 'All' ? 'ทั้งหมด' : cat}
                </button>
            `).join('');
        }

        function filterCategory(cat) {
            currentCategory = cat;
            renderCategories();
            renderProducts();
        }

        function renderProducts(searchTerm = '') {
            const grid = document.getElementById('productGrid');
            const filtered = products.filter(p => {
                const matchCat = currentCategory === 'All' || p.Category === currentCategory;
                const matchSearch = p.Name.toLowerCase().includes(searchTerm.toLowerCase());
                return matchCat && matchSearch;
            });

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-10 text-center text-gray-400">ไม่พบสินค้า</div>`;
                return;
            }

            grid.innerHTML = filtered.map(p => `
                <div onclick="addToCart('${p.ID}')" class="product-card glass-panel p-4 cursor-pointer group">
                    <div class="h-32 w-full mb-3 overflow-hidden rounded-xl bg-gray-100">
                        <img src="${p.Image}" alt="${p.Name}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                    </div>
                    <h3 class="font-bold text-gray-800 truncate">${p.Name}</h3>
                    <p class="text-xs text-gray-500 mb-2">${p.Category || 'ทั่วไป'}</p>
                    <div class="flex justify-between items-center">
                        <span class="text-indigo-600 font-bold">฿${p.Price.toLocaleString()}</span>
                        <div class="bg-indigo-50 text-indigo-600 p-1 rounded-lg group-hover:bg-indigo-600 group-hover:text-white transition-colors">
                            <i data-lucide="plus" class="w-4 h-4"></i>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function addToCart(productId) {
            const product = products.find(p => p.ID == productId);
            const existing = cart.find(item => item.ID == productId);

            if (existing) {
                existing.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            updateCartUI();
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.ID != productId);
            updateCartUI();
        }

        function updateQuantity(productId, delta) {
            const item = cart.find(i => i.ID == productId);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) removeFromCart(productId);
            }
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cartItems');
            if (cart.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-gray-400"><p>ยังไม่มีสินค้าในรถเข็น</p></div>`;
            } else {
                container.innerHTML = cart.map(item => `
                    <div class="flex items-center gap-3 bg-white/50 p-3 rounded-2xl">
                        <div class="flex-1">
                            <h4 class="text-sm font-bold text-gray-800">${item.Name}</h4>
                            <p class="text-xs text-indigo-600 font-semibold">฿${(item.Price * item.quantity).toLocaleString()}</p>
                        </div>
                        <div class="flex items-center gap-2 bg-white rounded-xl border border-gray-100 p-1">
                            <button onclick="updateQuantity('${item.ID}', -1)" class="w-6 h-6 flex items-center justify-center hover:bg-gray-100 rounded-lg">-</button>
                            <span class="text-sm font-bold w-4 text-center">${item.quantity}</span>
                            <button onclick="updateQuantity('${item.ID}', 1)" class="w-6 h-6 flex items-center justify-center hover:bg-gray-100 rounded-lg">+</button>
                        </div>
                        <button onclick="removeFromCart('${item.ID}')" class="text-red-400 hover:text-red-600 p-1">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                `).join('');
            }

            const sub = cart.reduce((sum, item) => sum + (item.Price * item.quantity), 0);
            const vat = sub * 0.07;
            const total = sub + vat;

            document.getElementById('subtotal').innerText = `฿${sub.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('vat').innerText = `฿${vat.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('total').innerText = `฿${total.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            
            lucide.createIcons();
        }

        function clearCart() {
            if(confirm('ยืนยันการล้างรายการทั้งหมด?')) {
                cart = [];
                updateCartUI();
            }
        }

        function processPayment() {
            if (cart.length === 0) return alert('กรุณาเลือกสินค้า');
            const total = document.getElementById('total').innerText;
            document.getElementById('modalTotal').innerText = total;
            document.getElementById('paymentModal').classList.remove('hidden');
            document.getElementById('cashReceived').focus();
        }

        function calculateChange() {
            const total = parseFloat(document.getElementById('total').innerText.replace('฿', '').replace(/,/g, ''));
            const received = parseFloat(document.getElementById('cashReceived').value) || 0;
            const change = received - total;
            const display = document.getElementById('changeAmount');
            
            display.innerText = `฿${(change > 0 ? change : 0).toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            display.className = change >= 0 ? 'text-green-600' : 'text-red-500';
        }

        function closeModal() {
            document.getElementById('paymentModal').classList.add('hidden');
            document.getElementById('cashReceived').value = '';
        }

        function completeSale() {
            const total = parseFloat(document.getElementById('total').innerText.replace('฿', '').replace(/,/g, ''));
            const received = parseFloat(document.getElementById('cashReceived').value) || 0;
            
            if (received < total) return alert('ยอดเงินที่รับมาไม่เพียงพอ');
            
            alert('การสั่งซื้อเสร็จสมบูรณ์!\nขอบคุณที่ใช้บริการ');
            cart = [];
            updateCartUI();
            closeModal();
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('th-TH', { hour12: false }) + ' | ' + now.toLocaleDateString('th-TH');
        }
    </script>
</body>
</html>
